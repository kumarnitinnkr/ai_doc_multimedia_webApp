version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qaapp
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    container_name: spring_backend
    depends_on:
      - mysql
    environment:
      OPENAI_API_KEY: YOUR_API_KEY
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: react_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"